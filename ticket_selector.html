<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Olympics Ticket Selector</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.header { background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #c4a035 100%); color: white; padding: 6px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 1.1em; display: inline; }
.header .subtitle { font-size: 0.8em; opacity: 0.8; display: inline; margin-left: 10px; }
.ticket-counter { background: rgba(255,255,255,0.15); border-radius: 6px; padding: 3px 12px; text-align: center; display: flex; align-items: center; gap: 6px; }
.ticket-counter .count { font-size: 1.1em; font-weight: bold; }
.ticket-counter .label { font-size: 0.7em; opacity: 0.8; }
.ticket-counter.warning .count { color: #ffcc00; }
.ticket-counter.full .count { color: #ff4444; }

.controls { background: white; padding: 4px 15px; border-bottom: 1px solid #e0e0e0; display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start; flex-shrink: 0; }
.control-group { display: flex; flex-direction: column; gap: 1px; }
.control-group label { font-size: 0.65em; font-weight: 600; text-transform: uppercase; color: #666; }
.control-group select, .control-group input { padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8em; }
.control-group select { min-width: 140px; }

.btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.78em; font-weight: 600; }
.btn-primary { background: #1a3a5c; color: white; }
.btn-primary:hover { background: #0a2a4c; }
.btn-danger { background: #dc3545; color: white; }
.btn-success { background: #28a745; color: white; }
.btn-warning { background: #ffc107; color: #333; }
.btn-sm { padding: 3px 8px; font-size: 0.75em; }

.main-layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.sidebar { width: 250px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 6px; flex-shrink: 0; }
.results { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.results-scroll { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }

.sport-filter { margin-bottom: 1px; }
.sport-filter label { display: flex; align-items: center; gap: 4px; padding: 2px 4px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
.sport-filter label:hover { background: #f0f0f0; }
.sport-filter input[type="checkbox"] { accent-color: #1a3a5c; }
.sport-count { font-size: 0.7em; color: #999; margin-left: auto; }

.section-header { font-size: 0.75em; font-weight: 700; text-transform: uppercase; color: #1a3a5c; padding: 8px 6px 4px; border-bottom: 1px solid #eee; margin-top: 10px; }

.day-group { margin-bottom: 20px; }
.day-header { background: #1a3a5c; color: white; padding: 8px 12px; border-radius: 6px 6px 0 0; font-weight: 600; display: flex; justify-content: space-between; }
.day-header .date { font-size: 1em; }
.day-header .games-day { font-size: 0.8em; opacity: 0.8; }

.session-card { background: white; border: 1px solid #e0e0e0; border-left: 4px solid #ccc; padding: 10px 12px; margin-bottom: 1px; display: flex; align-items: center; gap: 12px; transition: all 0.15s; cursor: pointer; }
.session-card:hover { background: #f8f9ff; }
.session-card.selected { border-left-color: #28a745; background: #f0fff4; }
.session-card.conflict { border-left-color: #dc3545; background: #fff5f5; opacity: 0.6; }
.session-card.medal { border-left-color: #c4a035; }
.session-card.medal.selected { border-left-color: #28a745; }
.session-card.womens-highlight { border-left-color: #e91e63; }
.session-card.womens-highlight.selected { border-left-color: #28a745; }
.session-card.dimmed { opacity: 0.45; }

.session-checkbox { width: 20px; height: 20px; accent-color: #28a745; flex-shrink: 0; }
.session-info { flex: 1; min-width: 0; }
.session-top { display: flex; justify-content: space-between; align-items: center; }
.session-code { font-weight: 700; font-size: 0.9em; background: #eef; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
.session-sport { font-weight: 600; font-size: 0.85em; color: #1a3a5c; }
.session-time { font-size: 0.85em; color: #555; font-weight: 600; }
.session-venue { font-size: 0.78em; color: #777; }
.session-desc { font-size: 0.8em; color: #444; margin-top: 2px; }
.session-type { display: inline-block; font-size: 0.7em; font-weight: 600; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
.type-final { background: #c4a035; color: white; }
.type-preliminary { background: #6c757d; color: white; }
.type-semifinal { background: #17a2b8; color: white; }
.type-quarterfinal { background: #6f42c1; color: white; }

.range-day { padding: 2px 4px; font-size: 0.8em; border: 1px solid #ccc; border-radius: 4px; width: 32px; text-align: center; font-weight: 600; -moz-appearance: textfield; }
.range-day::-webkit-outer-spin-button, .range-day::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.range-group { display: flex; align-items: center; gap: 2px; border: 1px solid #ddd; border-radius: 4px; padding: 2px 5px; background: #fafafa; }
.range-num { font-size: 0.7em; font-weight: 700; color: #1a3a5c; margin-right: 2px; }
.tix-select { width: 44px; padding: 2px 2px; font-size: 0.8em; border: 1px solid #aaa; border-radius: 3px; text-align: center; background: #fff; font-weight: 700; color: #1a3a5c; }
.tix-label { font-size: 0.7em; color: #666; margin-right: 2px; }
.tix-wrapper { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

.gender-tag { display: inline-block; font-size: 0.65em; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
.gender-women { background: #fce4ec; color: #c2185b; border: 1px solid #f48fb1; }
.gender-men { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
.gender-mixed { background: #f3e5f5; color: #7b1fa2; border: 1px solid #ce93d8; }

.my-picks { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 2px solid #c4a035; }
.my-picks h3 { color: #1a3a5c; margin-bottom: 10px; font-size: 1em; }
.pick-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.83em; }
.pick-item:last-child { border-bottom: none; }
.pick-remove { color: #dc3545; cursor: pointer; font-weight: bold; }

.conflict-warning { background: #fff3cd; border: 1px solid #ffc107; padding: 8px 12px; border-radius: 4px; font-size: 0.82em; margin-bottom: 10px; }
.no-results { text-align: center; padding: 40px; color: #999; }

.quick-picks { display: flex; gap: 4px; flex-wrap: wrap; margin: 2px 0; }
.quick-pick { padding: 2px 8px; border-radius: 10px; font-size: 0.72em; cursor: pointer; border: 1px solid #1a3a5c; color: #1a3a5c; background: white; }
.quick-pick:hover, .quick-pick.active { background: #1a3a5c; color: white; }

.family-member { display: flex; align-items: center; gap: 6px; }
.family-member input { padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; width: 110px; font-size: 0.8em; }

.tab-bar { display: flex; border-bottom: 2px solid #1a3a5c; background: white; flex-shrink: 0; padding: 0 10px; }
.tab { padding: 6px 14px; cursor: pointer; font-size: 0.8em; font-weight: 600; border-bottom: 3px solid transparent; }
.tab:hover { background: #f0f0f0; }
.tab.active { border-bottom-color: #c4a035; color: #1a3a5c; }

.export-area { background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 0.8em; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

.football-section { background: #ffe; border: 2px solid #c4a035; border-radius: 8px; padding: 10px; margin-top: 10px; }
.football-section h4 { color: #1a3a5c; margin-bottom: 8px; font-size: 0.9em; }
.football-counter { font-weight: 700; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
.cal-header { background: #1a3a5c; color: white; padding: 6px; text-align: center; font-weight: 700; font-size: 0.8em; border-radius: 4px; }
.cal-day { background: white; border: 1px solid #e0e0e0; border-radius: 4px; min-height: 90px; padding: 4px; font-size: 0.75em; }
.cal-day.empty { background: #f5f5f5; border-color: #eee; }
.cal-day.has-events { border-color: #1a3a5c; border-width: 2px; }
.cal-date { font-weight: 700; font-size: 0.85em; color: #1a3a5c; margin-bottom: 3px; }
.cal-date .games-day-label { font-weight: 400; font-size: 0.8em; color: #999; }
.cal-event { padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; font-size: 0.8em; line-height: 1.2; cursor: default; }
.cal-event.cal-main { background: #e3f2fd; border-left: 3px solid #1565c0; }
.cal-event.cal-football { background: #e8f5e9; border-left: 3px solid #2e7d32; }
.cal-event .cal-time { font-weight: 700; color: #555; }
.cal-event .cal-code { font-family: monospace; font-weight: 700; }

@media (max-width: 900px) {
  .main-layout { flex-direction: column; }
  .sidebar { width: 100%; max-height: 150px; border-right: none; border-bottom: 1px solid #ddd; flex-shrink: 0; }
  .results { min-height: 300px; }
}
</style>
</head>
<body>

<div class="header">
  <div><h1>LA Olympics Ticket Selector</h1><span class="subtitle">Presale Bid Planner</span></div>
  <div style="display:flex; gap:10px;">
    <div class="ticket-counter" id="mainCounter">
      <span class="count"><span id="mainTixTotal">0</span>/12</span>
      <span class="label">Event Tix</span>
    </div>
    <div class="ticket-counter" id="footballCounter">
      <span class="count"><span id="fbTixTotal">0</span>/12</span>
      <span class="label">Football Tix</span>
    </div>
  </div>
</div>

<div class="controls">
  <div class="family-member">
    <label style="font-size:0.7em; font-weight:600;">Purchaser:</label>
    <input type="text" id="purchaserName" placeholder="Your name" value="Bill">
    <label style="font-size:0.7em; font-weight:600; margin-left:8px;">Default Tix:</label>
    <select id="defaultTickets">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
    </select>
  </div>
  <div class="control-group">
    <label>Date Ranges (July 2028, can overlap)</label>
    <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
      <div class="range-group">
        <span class="range-num">Range 1</span><span style="font-size:0.7em;">Jul</span>
        <input type="number" class="range-day range-from" min="10" max="30" value="10" onchange="updateRangeLabels()">
        <span style="font-size:0.7em;">-</span>
        <input type="number" class="range-day range-to" min="10" max="30" value="16" onchange="updateRangeLabels()">
      </div>
      <div class="range-group">
        <span class="range-num">Range 2</span><span style="font-size:0.7em;">Jul</span>
        <input type="number" class="range-day range-from" min="10" max="30" value="17" onchange="updateRangeLabels()">
        <span style="font-size:0.7em;">-</span>
        <input type="number" class="range-day range-to" min="10" max="30" value="23" onchange="updateRangeLabels()">
      </div>
      <div class="range-group">
        <span class="range-num">Range 3</span><span style="font-size:0.7em;">Jul</span>
        <input type="number" class="range-day range-from" min="10" max="30" value="24" onchange="updateRangeLabels()">
        <span style="font-size:0.7em;">-</span>
        <input type="number" class="range-day range-to" min="10" max="30" value="30" onchange="updateRangeLabels()">
      </div>
      <div class="quick-picks" id="rangePresets" style="display:flex; align-items:center;"></div>
      <select id="sessionTypeFilter" onchange="renderSessions()" style="padding:3px 6px; font-size:0.8em; border:1px solid #ccc; border-radius:4px;">
        <option value="all">All Types</option>
        <option value="Final">Finals / Medal</option>
        <option value="Preliminary">Preliminary</option>
        <option value="Semifinal">Semifinal</option>
        <option value="Quarterfinal">Quarterfinal</option>
      </select>
      <select id="genderFilter" onchange="renderSessions()" style="padding:3px 6px; font-size:0.8em; border:1px solid #ccc; border-radius:4px;">
        <option value="all">All Genders</option>
        <option value="women">Women's Only</option>
        <option value="men">Men's Only</option>
        <option value="mixed">Mixed / Both</option>
        <option value="women+mixed">Women's + Mixed</option>
      </select>
    </div>
  </div>
  <button class="btn btn-danger btn-sm" onclick="clearAll()">Clear All Picks</button>
  <button class="btn btn-primary btn-sm" onclick="saveToURL()">Save to Link - Share/Bookmark</button>
  <div class="control-group" style="flex-direction:row; align-items:center; gap:4px;">
    <select id="exportFormat" style="padding:3px 6px; font-size:0.8em; border-radius:4px; border:1px solid #ccc;">
      <option value="csv">CSV</option>
      <option value="xls">Excel (.xls)</option>
      <option value="sheets">Google Sheets (Ctrl+V to paste)</option>
    </select>
    <button class="btn btn-success btn-sm" onclick="exportPicks()">Export Picks</button>
  </div>
</div>

<div class="main-layout">
  <div class="sidebar">
    <div class="section-header">Filter by Sport</div>
    <div id="sportFilters"></div>

    <div class="section-header" style="margin-top:15px;">Your Picks (<span id="pickCount">0</span>)</div>
    <div id="picksList"></div>

    <div class="football-section" style="margin-top:15px;">
      <h4>Football Venues (check to show)</h4>
      <div style="font-size:0.8em; margin-bottom:6px;" id="fbVenueFilters">
        <label><input type="checkbox" name="fbVenue" value="sanjose" checked onchange="renderSessions()"> San Jose</label><br>
        <label><input type="checkbox" name="fbVenue" value="rosebowl" checked onchange="renderSessions()"> Rose Bowl / Pasadena</label><br>
        <label><input type="checkbox" name="fbVenue" value="sandiego" onchange="renderSessions()"> San Diego</label><br>
        <label><input type="checkbox" name="fbVenue" value="nashville" onchange="renderSessions()"> Nashville</label><br>
        <label><input type="checkbox" name="fbVenue" value="columbus" onchange="renderSessions()"> Columbus</label><br>
        <label><input type="checkbox" name="fbVenue" value="newyork" onchange="renderSessions()"> New York</label><br>
        <label><input type="checkbox" name="fbVenue" value="stlouis" onchange="renderSessions()"> St. Louis</label><br>
      </div>
      <div class="football-counter">Football: <span id="fbPickCount">0</span> / 6 events</div>
    </div>
  </div>

  <div class="results">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('browse')">Browse Sessions</div>
      <div class="tab" onclick="switchTab('football')">Football (Soccer)</div>
      <div class="tab" onclick="switchTab('tracker')">Ticket Tracker</div>
      <div class="tab" onclick="switchTab('calendar')">Calendar</div>
    </div>
    <div class="results-scroll">
      <div id="browseTab"></div>
      <div id="footballTab" style="display:none;"></div>
      <div id="trackerTab" style="display:none;"></div>
      <div id="calendarTab" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
// DATA WILL BE INJECTED HERE
let ALL_SESSIONS = [];
let selectedSessions = new Map(); // code -> ticketCount
let selectedFootball = new Map(); // code -> ticketCount

// Load data
fetch('all_sessions.json')
  .then(r => r.json())
  .then(data => {
    ALL_SESSIONS = data;
    // Add ceremony sessions manually if not present
    const hasCeremony = data.some(s => s.Sport.includes('Ceremony'));
    if (!hasCeremony) {
      ALL_SESSIONS.push({
        Sport: 'Opening Ceremony', Venue: '2028 Stadium', Zone: 'Inglewood',
        SessionCode: 'OC001', Date: 'Friday, July 14', GamesDay: '0',
        SessionType: 'Final', Description: 'Opening Ceremony', StartTime: '17:00', EndTime: '21:00', NotTicketed: false
      });
      ALL_SESSIONS.push({
        Sport: 'Opening Ceremony - Celebration', Venue: 'LA Memorial Coliseum', Zone: 'Exposition Park',
        SessionCode: 'OC002', Date: 'Friday, July 14', GamesDay: '0',
        SessionType: 'Final', Description: 'Opening Ceremony - Celebration', StartTime: '17:00', EndTime: '21:00', NotTicketed: false
      });
      ALL_SESSIONS.push({
        Sport: 'Closing Ceremony', Venue: 'LA Memorial Coliseum', Zone: 'Exposition Park',
        SessionCode: 'CC001', Date: 'Sunday, July 30', GamesDay: '16',
        SessionType: 'Final', Description: 'Closing Ceremony', StartTime: '18:00', EndTime: '22:00', NotTicketed: false
      });
    }
    init();
  })
  .catch(e => {
    console.error('Failed to load data, using inline fallback', e);
    document.getElementById('browseTab').innerHTML = '<div class="no-results">Error loading session data. Make sure all_sessions.json is in the same folder.</div>';
  });

function classifyGender(desc) {
  if (!desc) return 'unknown';
  const d = desc.toLowerCase();
  const hasWomen = /women|woman|female/.test(d);
  const hasMen = /\bmen\b|\bman\b|\bmale\b/.test(d) && !/women/.test(d);
  // Check for "Men's" specifically (not inside "Women's")
  const menExplicit = /\bmen's\b/i.test(desc);
  const womenExplicit = /\bwomen's\b/i.test(desc);
  const mixed = /mixed|both|open\b/i.test(d);

  if (mixed) return 'mixed';
  if (womenExplicit && menExplicit) return 'mixed';  // "Men's/Women's Apparatus Finals"
  if (womenExplicit && !menExplicit) return 'women';
  if (menExplicit && !womenExplicit) return 'men';
  // Fallback: check description lines
  const lines = desc.split(/[|\/]/);
  const genders = new Set();
  lines.forEach(l => {
    if (/women/i.test(l)) genders.add('women');
    if (/\bmen\b/i.test(l) && !/women/i.test(l)) genders.add('men');
    if (/mixed|open/i.test(l)) genders.add('mixed');
  });
  if (genders.size > 1) return 'mixed';
  if (genders.has('women')) return 'women';
  if (genders.has('men')) return 'men';
  return 'unknown'; // ceremonies, etc.
}

function genderTag(gender) {
  if (gender === 'women') return '<span class="gender-tag gender-women">W</span>';
  if (gender === 'men') return '<span class="gender-tag gender-men">M</span>';
  if (gender === 'mixed') return '<span class="gender-tag gender-mixed">M/W</span>';
  return '';
}

function init() {
  // Pre-compute gender for all sessions
  ALL_SESSIONS.forEach(s => {
    s._gender = classifyGender(s.Description + ' ' + (s.Sport || ''));
  });
  buildSportFilters();
  // Try loading saved state from URL or localStorage
  const loaded = loadFromURL();
  if (!loaded) {
    // Default sport selections for first-time users
    const preselect = ['Artistic Gymnastics', 'Athletics (Track & Field)', 'Opening Ceremony', 'Opening Ceremony - Celebration', 'Closing Ceremony', 'Swimming'];
    document.querySelectorAll('#sportFilters input[type=checkbox]').forEach(cb => {
      if (preselect.some(s => cb.value === s)) cb.checked = true;
    });
    updateRangeLabels();
    renderSessions();
  }
}

function parseDate(dateStr) {
  // "Friday, July 14" -> Date object in 2028
  const m = dateStr.match(/July\s+(\d+)/);
  if (!m) return null;
  return new Date(2028, 6, parseInt(m[1])); // July = month 6
}

function dateToISO(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return '';
  return d.toISOString().split('T')[0];
}

function buildSportFilters() {
  const sportCounts = {};
  ALL_SESSIONS.forEach(s => {
    if (s.Sport === 'Football (Soccer)') return; // Separate section
    sportCounts[s.Sport] = (sportCounts[s.Sport] || 0) + 1;
  });

  const container = document.getElementById('sportFilters');
  const sorted = Object.keys(sportCounts).sort();
  container.innerHTML = sorted.map(sport => `
    <div class="sport-filter">
      <label>
        <input type="checkbox" value="${sport}" onchange="renderSessions()">
        ${sport}
        <span class="sport-count">(${sportCounts[sport]})</span>
      </label>
    </div>
  `).join('');
}

function getSelectedSports() {
  return Array.from(document.querySelectorAll('#sportFilters input:checked')).map(cb => cb.value);
}

// Track which range presets are active (by index, or 'all')
let activeRanges = new Set(['all']);

function getDefinedRanges() {
  const froms = document.querySelectorAll('.range-from');
  const tos = document.querySelectorAll('.range-to');
  const ranges = [];
  let idx = 0;
  for (let i = 0; i < froms.length; i++) {
    const fromVal = froms[i].value;
    const toVal = tos[i].value;
    if (fromVal && toVal) {
      ranges.push({ from: '2028-07-' + String(fromVal).padStart(2, '0'), to: '2028-07-' + String(toVal).padStart(2, '0'), index: idx });
    }
    idx++;
  }
  return ranges;
}

function formatRangeLabel(from, to) {
  const f = new Date(from + 'T00:00:00');
  const t = new Date(to + 'T00:00:00');
  return `${f.getMonth()+1}/${f.getDate()}-${t.getMonth()+1}/${t.getDate()}`;
}

function updateRangeLabels() {
  const ranges = getDefinedRanges();
  const container = document.getElementById('rangePresets');
  let html = '';
  ranges.forEach((r, i) => {
    const label = formatRangeLabel(r.from, r.to);
    const isActive = activeRanges.has(String(r.index));
    html += `<span class="quick-pick ${isActive ? 'active' : ''}" onclick="toggleRange('${r.index}')">${label}</span>`;
  });
  const allActive = activeRanges.has('all');
  html += `<span class="quick-pick ${allActive ? 'active' : ''}" onclick="toggleRange('all')">All Dates</span>`;
  container.innerHTML = html;
}

function toggleRange(key) {
  if (key === 'all') {
    // If turning on "all", clear other selections
    if (activeRanges.has('all')) {
      activeRanges.delete('all');
    } else {
      activeRanges = new Set(['all']);
    }
  } else {
    activeRanges.delete('all');
    if (activeRanges.has(key)) {
      activeRanges.delete(key);
    } else {
      activeRanges.add(key);
    }
    // If nothing selected, default to all
    if (activeRanges.size === 0) activeRanges.add('all');
  }
  updateRangeLabels();
  renderSessions();
}

function getActiveDateRanges() {
  if (activeRanges.has('all')) return null; // no filtering
  const defined = getDefinedRanges();
  const ranges = [];
  activeRanges.forEach(key => {
    const idx = parseInt(key);
    const r = defined.find(d => d.index === idx);
    if (r) ranges.push(r);
  });
  return ranges.length > 0 ? ranges : null;
}

function getFilters() {
  const sports = getSelectedSports();
  const dateRanges = getActiveDateRanges();
  const sessionType = document.getElementById('sessionTypeFilter').value;
  const gender = document.getElementById('genderFilter').value;
  return { sports, dateRanges, sessionType, gender };
}

function filterSessions(sessions, filters) {
  return sessions.filter(s => {
    if (s.Sport === 'Football (Soccer)') return false;
    if (s.NotTicketed) return false;
    if (filters.sports.length > 0 && !filters.sports.includes(s.Sport)) return false;
    // Date range filter - check if session falls in ANY active range
    if (filters.dateRanges) {
      const iso = dateToISO(s.Date);
      const inRange = filters.dateRanges.some(r => iso >= r.from && iso <= r.to);
      if (!inRange) return false;
    }
    if (filters.sessionType !== 'all' && s.SessionType !== filters.sessionType) return false;
    if (filters.gender !== 'all' && s._gender !== 'unknown') {
      if (filters.gender === 'women' && s._gender !== 'women') return false;
      if (filters.gender === 'men' && s._gender !== 'men') return false;
      if (filters.gender === 'mixed' && s._gender !== 'mixed') return false;
      if (filters.gender === 'women+mixed' && s._gender !== 'women' && s._gender !== 'mixed') return false;
    }
    return true;
  });
}

function getConflicts(sessionCode) {
  // Check if this session time-conflicts with any selected session on the same day
  const session = ALL_SESSIONS.find(s => s.SessionCode === sessionCode);
  if (!session) return [];
  const conflicts = [];
  const allSelected = new Set([...selectedSessions.keys(), ...selectedFootball.keys()]);
  allSelected.forEach(code => {
    if (code === sessionCode) return;
    const other = ALL_SESSIONS.find(s => s.SessionCode === code);
    if (!other) return;
    if (dateToISO(session.Date) !== dateToISO(other.Date)) return;
    // Check time overlap
    if (session.StartTime !== 'TBD' && other.StartTime !== 'TBD') {
      const s1 = timeToMin(session.StartTime), e1 = timeToMin(session.EndTime);
      const s2 = timeToMin(other.StartTime), e2 = timeToMin(other.EndTime);
      if (s1 < e2 && s2 < e1) {
        conflicts.push(other);
      }
    }
  });
  return conflicts;
}

function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function toggleSession(code, isFootball) {
  const map = isFootball ? selectedFootball : selectedSessions;

  if (map.has(code)) {
    map.delete(code);
  } else {
    let currentTotal = 0;
    map.forEach(t => currentTotal += t);
    const defaultTix = parseInt(document.getElementById('defaultTickets').value);
    if (currentTotal + defaultTix > 12) {
      alert(`Adding ${defaultTix} tickets would exceed the 12-ticket ${isFootball ? 'football ' : ''}limit (currently ${currentTotal}). Reduce tickets on other events or remove one first.`);
      return;
    }
    const conflicts = getConflicts(code);
    if (conflicts.length > 0) {
      const names = conflicts.map(c => `${c.SessionCode} (${c.Sport} ${c.StartTime})`).join(', ');
      if (!confirm(`Time conflict with: ${names}. Select anyway?`)) return;
    }
    map.set(code, defaultTix);
  }
  renderSessions();
}

function updateTickets(code, isFootball, count) {
  const map = isFootball ? selectedFootball : selectedSessions;
  if (map.has(code)) {
    const newCount = parseInt(count);
    let otherTotal = 0;
    map.forEach((t, c) => { if (c !== code) otherTotal += t; });
    if (otherTotal + newCount > 12) {
      alert(`Total would exceed 12 tickets. Currently ${otherTotal} tickets on other events.`);
      renderSessions(); // reset the dropdown
      return;
    }
    map.set(code, newCount);
    renderPicks();
    updateCounters();
    renderCalendar();
    renderTracker();
  }
}

function tixOptions(selected) {
  let html = '';
  for (let i = 1; i <= 12; i++) {
    html += `<option value="${i}" ${i === selected ? 'selected' : ''}>${i}</option>`;
  }
  return html;
}

function renderSessions() {
  const filters = getFilters();
  const filtered = filterSessions(ALL_SESSIONS, filters);

  // Group by date
  const byDate = {};
  filtered.forEach(s => {
    const key = s.Date;
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(s);
  });

  // Sort dates
  const sortedDates = Object.keys(byDate).sort((a, b) => {
    const da = parseDate(a), db = parseDate(b);
    return da - db;
  });

  let html = '';
  if (filtered.length === 0) {
    html = '<div class="no-results">No sessions match your filters. Try adjusting sport selection or date range.</div>';
  }

  sortedDates.forEach(date => {
    const sessions = byDate[date].sort((a, b) => (a.StartTime || '').localeCompare(b.StartTime || ''));
    const gd = sessions[0].GamesDay;
    html += `<div class="day-group">
      <div class="day-header">
        <span class="date">${date}, 2028</span>
        <span class="games-day">Games Day ${gd}</span>
      </div>`;

    sessions.forEach(s => {
      const isSelected = selectedSessions.has(s.SessionCode);
      const tixCount = selectedSessions.get(s.SessionCode) || 0;
      const conflicts = getConflicts(s.SessionCode);
      const hasConflict = !isSelected && conflicts.length > 0;
      const isMedal = s.SessionType === 'Final' || s.SessionType === 'Bronze';
      const gender = s._gender || 'unknown';
      let classes = 'session-card';
      if (isSelected) classes += ' selected';
      if (hasConflict) classes += ' conflict';
      if (isMedal) classes += ' medal';
      if (gender === 'women' && !isSelected) classes += ' womens-highlight';

      const typeClass = s.SessionType === 'Final' ? 'type-final' :
                        s.SessionType === 'Preliminary' ? 'type-preliminary' :
                        s.SessionType === 'Semifinal' ? 'type-semifinal' :
                        s.SessionType === 'Quarterfinal' ? 'type-quarterfinal' : 'type-preliminary';

      const desc = s.Description.replace(/\|/g, ' / ').substring(0, 120);
      const tixSelector = isSelected ? `<div class="tix-wrapper" onclick="event.stopPropagation()"><span class="tix-label">tix:</span><select class="tix-select" onchange="updateTickets('${s.SessionCode}', false, this.value)">${tixOptions(tixCount)}</select></div>` : '';

      html += `<div class="${classes}" onclick="toggleSession('${s.SessionCode}', false)">
        <input type="checkbox" class="session-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleSession('${s.SessionCode}', false)">
        <div class="session-info">
          <div class="session-top">
            <div>
              <span class="session-code">${s.SessionCode}</span>
              <span class="session-sport">${s.Sport}</span>
              ${genderTag(gender)}
              <span class="session-type ${typeClass}">${s.SessionType}</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              ${tixSelector}
              <span class="session-time">${s.StartTime} - ${s.EndTime}</span>
            </div>
          </div>
          <div class="session-venue">${s.Venue} (${s.Zone})</div>
          <div class="session-desc">${desc}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('browseTab').innerHTML = html;
  renderFootball();
  renderPicks();
  updateCounters();
  // Always re-render calendar and tracker so they stay in sync
  renderCalendar();
  renderTracker();
}

function renderCalendar() {
  const allPicks = [...selectedSessions.keys(), ...selectedFootball.keys()];
  const sessions = allPicks.map(code => ALL_SESSIONS.find(s => s.SessionCode === code)).filter(Boolean);

  // Build events by date (July 10-30)
  const eventsByDate = {};
  sessions.forEach(s => {
    const m = s.Date.match(/July\s+(\d+)/);
    if (!m) return;
    const day = parseInt(m[1]);
    if (!eventsByDate[day]) eventsByDate[day] = [];
    const isFB = s.Sport === 'Football (Soccer)';
    const tix = isFB ? selectedFootball.get(s.SessionCode) : selectedSessions.get(s.SessionCode);
    eventsByDate[day].push({ ...s, tix, isFB });
  });

  // July 2028: starts on Saturday (July 1 = Saturday)
  // July 10 = Monday, July 30 = Sunday (3 full weeks)
  let html = '<h3 style="margin-bottom:10px;">Selected Events Calendar - July 2028</h3>';

  // Week headers
  html += '<div class="cal-grid">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    html += `<div class="cal-header">${d}</div>`;
  });

  // Games day mapping: Day 0 = July 14
  function gamesDay(day) {
    if (day < 14) return 'Day ' + (day - 14);
    return 'Day ' + (day - 14);
  }

  // July 10 is Monday - start from there through July 30 (Sunday)
  for (let day = 10; day <= 30; day++) {
    const events = eventsByDate[day] || [];
    const hasEvents = events.length > 0;
    const dayOfWeek = new Date(2028, 6, day).toLocaleDateString('en-US', { weekday: 'short' });

    html += `<div class="cal-day ${hasEvents ? 'has-events' : ''}">`;
    html += `<div class="cal-date">Jul ${day} <span class="games-day-label">${gamesDay(day)}</span></div>`;

    // Sort events by start time
    events.sort((a, b) => (a.StartTime || '').localeCompare(b.StartTime || ''));

    events.forEach(e => {
      const cls = e.isFB ? 'cal-football' : 'cal-main';
      const gender = e._gender === 'women' ? ' [W]' : e._gender === 'men' ? ' [M]' : e._gender === 'mixed' ? ' [M/W]' : '';
      const time = e.StartTime !== 'TBD' ? e.StartTime : 'TBD';
      const sportShort = e.isFB ? 'Football' : e.Sport.replace('Athletics (Track & Field)', 'Athletics').replace('Artistic Gymnastics', 'Gymnastics');
      html += `<div class="cal-event ${cls}" title="${e.Description.replace(/\|/g, ' / ')}">
        <span class="cal-time">${time}</span> <span class="cal-code">${e.SessionCode}</span> x${e.tix}<br>
        ${sportShort}${gender}
      </div>`;
    });

    html += '</div>';

    // Line break after Sunday
    if (new Date(2028, 6, day).getDay() === 0 && day < 30) {
      // grid wraps automatically
    }
  }
  html += '</div>';

  // Summary below
  let mainTotal = 0; selectedSessions.forEach(t => mainTotal += t);
  let fbTotal = 0; selectedFootball.forEach(t => fbTotal += t);
  const totalDays = new Set(sessions.map(s => { const m = s.Date.match(/July\s+(\d+)/); return m ? m[1] : null; }).filter(Boolean)).size;

  html += `<div style="margin-top:15px; padding:10px; background:#f0f0f0; border-radius:4px; font-size:0.9em;">
    <strong>Overview:</strong> ${allPicks.length} events across ${totalDays} days |
    ${mainTotal} event tickets + ${fbTotal} football tickets = <strong>${mainTotal + fbTotal} total tickets</strong>
  </div>`;

  // Conflict check
  const conflictDays = [];
  Object.entries(eventsByDate).forEach(([day, evts]) => {
    for (let i = 0; i < evts.length; i++) {
      for (let j = i + 1; j < evts.length; j++) {
        const a = evts[i], b = evts[j];
        if (a.StartTime !== 'TBD' && b.StartTime !== 'TBD') {
          const s1 = timeToMin(a.StartTime), e1 = timeToMin(a.EndTime);
          const s2 = timeToMin(b.StartTime), e2 = timeToMin(b.EndTime);
          if (s1 < e2 && s2 < e1) {
            conflictDays.push(`Jul ${day}: ${a.SessionCode} (${a.StartTime}-${a.EndTime}) overlaps ${b.SessionCode} (${b.StartTime}-${b.EndTime})`);
          }
        }
      }
    }
  });
  if (conflictDays.length > 0) {
    html += `<div style="margin-top:10px; padding:10px; background:#fff3cd; border:1px solid #ffc107; border-radius:4px; font-size:0.85em;">
      <strong>Time Conflicts:</strong><br>${conflictDays.join('<br>')}
    </div>`;
  }

  document.getElementById('calendarTab').innerHTML = html;
}

function getExportData() {
  const name = document.getElementById('purchaserName').value || 'Family';
  const allPicks = [...selectedSessions.keys(), ...selectedFootball.keys()];
  const sorted = allPicks.map(code => ALL_SESSIONS.find(s => s.SessionCode === code)).filter(Boolean)
    .sort((a, b) => parseDate(a.Date) - parseDate(b.Date));
  const headers = ['Event','Venue','Zone','Session Code','Date','Games Day','Session Type','Gender','Description','Start','End','Tickets','Purchaser'];
  const rows = sorted.map(s => {
    const isFB = s.Sport === 'Football (Soccer)';
    const t = isFB ? (selectedFootball.get(s.SessionCode) || 0) : (selectedSessions.get(s.SessionCode) || 0);
    const g = s._gender === 'women' ? 'W' : s._gender === 'men' ? 'M' : s._gender === 'mixed' ? 'M/W' : '';
    const desc = (s.Description || '').replace(/\|/g, ' / ').substring(0, 120);
    return [s.Sport, s.Venue, s.Zone, s.SessionCode, s.Date, s.GamesDay, s.SessionType, g, desc, s.StartTime, s.EndTime, t, name];
  });
  return { name, headers, rows, sorted };
}

function exportPicks() {
  const format = document.getElementById('exportFormat').value;
  const { name, headers, rows, sorted } = getExportData();
  const datestamp = new Date().toISOString().split('T')[0];

  if (format === 'csv') {
    let csv = headers.join(',') + '\n';
    rows.forEach(row => {
      csv += row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',') + '\n';
    });
    downloadFile(csv, `${name}_olympic_tickets_${datestamp}.csv`, 'text/csv');
    alert('CSV downloaded!');

  } else if (format === 'xls') {
    // HTML table that Excel opens natively as .xls
    let xls = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Tickets</x:Name></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table>';
    xls += '<tr>' + headers.map(h => `<th style="background:#1a3a5c;color:white;font-weight:bold;padding:4px 8px;">${h}</th>`).join('') + '</tr>';
    rows.forEach(row => {
      const isFinal = row[6] === 'Final';
      const bg = isFinal ? '#FFF8E1' : '#FFFFFF';
      xls += '<tr>' + row.map(v => `<td style="background:${bg};padding:3px 6px;border:1px solid #ddd;">${v}</td>`).join('') + '</tr>';
    });
    // Summary row
    let mainTotal = 0; selectedSessions.forEach(t => mainTotal += t);
    let fbTotal = 0; selectedFootball.forEach(t => fbTotal += t);
    xls += `<tr><td colspan="11" style="font-weight:bold;padding:6px;">Total</td><td style="font-weight:bold;padding:6px;">${mainTotal + fbTotal}</td><td></td></tr>`;
    xls += '</table></body></html>';
    downloadFile(xls, `${name}_olympic_tickets_${datestamp}.xls`, 'application/vnd.ms-excel');
    alert('Excel file downloaded!');

  } else if (format === 'sheets') {
    // Tab-separated for pasting into Google Sheets
    let tsv = headers.join('\t') + '\n';
    rows.forEach(row => {
      tsv += row.map(v => String(v).replace(/\t/g, ' ')).join('\t') + '\n';
    });
    const copyAndOpen = () => {
      if (!confirm('Your picks are copied to the clipboard!\n\nA new Google Sheet will open in a new tab.\nClick cell A1, then press Ctrl+V (Cmd+V on Mac) to paste.\n\nClick OK to open Google Sheets now.')) return;
      window.open('https://docs.google.com/spreadsheets/create', '_blank');
    };
    navigator.clipboard.writeText(tsv).then(copyAndOpen).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = tsv;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyAndOpen();
    });
  }

  switchTab('tracker');
  renderTracker();
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// === SAVE / LOAD STATE ===

function getState() {
  const sports = Array.from(document.querySelectorAll('#sportFilters input:checked')).map(cb => cb.value);
  const froms = Array.from(document.querySelectorAll('.range-from')).map(i => i.value);
  const tos = Array.from(document.querySelectorAll('.range-to')).map(i => i.value);
  // Note: froms/tos are now day numbers (10-30) not full dates
  const main = {};
  selectedSessions.forEach((tix, code) => main[code] = tix);
  const fb = {};
  selectedFootball.forEach((tix, code) => fb[code] = tix);
  const fbVenues = Array.from(document.querySelectorAll('input[name=fbVenue]:checked')).map(cb => cb.value);
  return {
    name: document.getElementById('purchaserName').value,
    defTix: document.getElementById('defaultTickets').value,
    sports,
    froms, tos,
    ranges: Array.from(activeRanges),
    type: document.getElementById('sessionTypeFilter').value,
    gender: document.getElementById('genderFilter').value,
    main, fb, fbVenues
  };
}

function applyState(state) {
  if (!state) return false;
  try {
    if (state.name) document.getElementById('purchaserName').value = state.name;
    if (state.defTix) document.getElementById('defaultTickets').value = state.defTix;
    if (state.sports) {
      document.querySelectorAll('#sportFilters input').forEach(cb => {
        cb.checked = state.sports.includes(cb.value);
      });
    }
    if (state.froms && state.tos) {
      const froms = document.querySelectorAll('.range-from');
      const tos = document.querySelectorAll('.range-to');
      state.froms.forEach((v, i) => {
        if (!froms[i]) return;
        // Handle old format (2028-07-10) or new format (10)
        froms[i].value = String(v).includes('-') ? v.split('-').pop().replace(/^0/, '') : v;
      });
      state.tos.forEach((v, i) => {
        if (!tos[i]) return;
        tos[i].value = String(v).includes('-') ? v.split('-').pop().replace(/^0/, '') : v;
      });
    }
    if (state.ranges) activeRanges = new Set(state.ranges);
    if (state.type) document.getElementById('sessionTypeFilter').value = state.type;
    if (state.gender) document.getElementById('genderFilter').value = state.gender;
    if (state.main) {
      selectedSessions = new Map();
      Object.entries(state.main).forEach(([code, tix]) => selectedSessions.set(code, tix));
    }
    if (state.fb) {
      selectedFootball = new Map();
      Object.entries(state.fb).forEach(([code, tix]) => selectedFootball.set(code, tix));
    }
    if (state.fbVenues) {
      document.querySelectorAll('input[name=fbVenue]').forEach(cb => {
        cb.checked = state.fbVenues.includes(cb.value);
      });
    }
    updateRangeLabels();
    renderSessions();
    return true;
  } catch(e) {
    console.error('Failed to apply state', e);
    return false;
  }
}

function saveToURL() {
  const state = getState();
  const encoded = btoa(JSON.stringify(state));
  const url = window.location.origin + window.location.pathname + '#' + encoded;
  history.replaceState(null, '', '#' + encoded);
  // Also save to localStorage
  localStorage.setItem('olympics28_state', JSON.stringify(state));
  // Copy URL to clipboard
  navigator.clipboard.writeText(url).then(() => {
    alert('Link copied to clipboard! Bookmark it or share with family.\n\nYour selections are saved in this link.');
  }).catch(() => {
    prompt('Copy this link to save your selections:', url);
  });
}

function autoSave() {
  const state = getState();
  localStorage.setItem('olympics28_state', JSON.stringify(state));
}

function loadFromURL() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    try {
      const state = JSON.parse(atob(hash));
      return applyState(state);
    } catch(e) {
      console.log('Invalid URL state, trying localStorage');
    }
  }
  // Fallback to localStorage
  const saved = localStorage.getItem('olympics28_state');
  if (saved) {
    try {
      return applyState(JSON.parse(saved));
    } catch(e) {
      console.log('Invalid localStorage state');
    }
  }
  return false;
}

// Auto-save on every change
const _origRender = renderSessions;
renderSessions = function() {
  _origRender();
  autoSave();
};

// Listen for filter changes
document.getElementById('sessionTypeFilter').addEventListener('change', renderSessions);
document.getElementById('defaultTickets').addEventListener('change', () => {});
</script>
